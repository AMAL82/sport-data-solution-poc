services:

  # Redpanda — broker Kafka-compatible
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: sport_redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 512M
      - --mode dev-container
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redpanda Console — UI topics sur http://localhost:8081
  redpanda-console:
    image: redpandadata/console:latest
    container_name: sport_redpanda_console
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092

  # Spark Master — UI sur http://localhost:8082
  spark-master:
    image: apache/spark:3.5.0
    container_name: sport_spark_master
    entrypoint: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "7077:7077"
      - "8082:8080"
    volumes:
      - ./spark:/opt/spark/jobs
      - ./data:/opt/spark/data

  # Spark Worker
  spark-worker:
    image: apache/spark:3.5.0
    container_name: sport_spark_worker
    entrypoint: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_WEBUI_PORT=8081
    volumes:
      - ./spark:/opt/spark/jobs
      - ./data:/opt/spark/data

  # Kestra — orchestration sur http://localhost:8080
  kestra:
    image: kestra/kestra:latest
    container_name: sport_kestra
    command: server standalone
    user: "root"
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KESTRA_CONFIGURATION: |
        kestra:
          repository:
            type: h2
          queue:
            type: h2
          storage:
            type: local
            local:
              basePath: "/app/storage"
    env_file:
      - .env
    volumes:
      - kestra-data:/app/storage
      - ./:/app/project
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd

volumes:
  redpanda-data:
  kestra-data:
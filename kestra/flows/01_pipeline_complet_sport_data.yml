id: pipeline_complet_sport_data
namespace: sport.data.solution

description: Pipeline batch complet Sport Data Solution.

pluginDefaults:
  - type: io.kestra.plugin.scripts.shell.Commands
    values:
      taskRunner:
        type: io.kestra.plugin.core.runner.Process

tasks:
  - id: installer_dependances
    type: io.kestra.plugin.scripts.shell.Commands
    commands:
      - pip install -q duckdb==1.1.3 pandas==2.2.3 faker==30.8.2 openpyxl python-dotenv requests confluent-kafka loguru

  - id: initialiser_entrepot
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      PYTHONPATH: /app/project
    commands:
      - python /app/project/src/utils/initialiser_entrepot.py --force

  - id: ingerer_donnees_rh
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      PYTHONPATH: /app/project
    commands:
      - python /app/project/src/ingestion/ingerer_donnees_rh.py

  - id: generer_activites_sportives
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      PYTHONPATH: /app/project
    commands:
      - python /app/project/src/generation/generer_activites_sportives.py

  - id: controler_qualite
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      PYTHONPATH: /app/project
    commands:
      - python /app/project/src/qualite/controler_qualite_donnees.py

  - id: geocoder_adresses
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      PYTHONPATH: /app/project
    commands:
      - python /app/project/src/metier/geocoder_adresses.py

  - id: appliquer_regles_metier
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      PYTHONPATH: /app/project
    commands:
      - python /app/project/src/metier/appliquer_regles_metier.py

  - id: calculer_kpi
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      PYTHONPATH: /app/project
    commands:
      - python /app/project/src/metier/calculer_indicateurs_kpi.py

  - id: exporter_powerbi
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      PYTHONPATH: /app/project
    commands:
      - python /app/project/src/export/exporter_donnees_powerbi.py

  - id: envoyer_messages_slack
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      PYTHONPATH: /app/project
    commands:
      - python /app/project/src/streaming/envoyer_messages_slack.py
